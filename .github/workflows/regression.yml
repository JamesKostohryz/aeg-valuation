name: AEG regression harness

on:
  push:
    branches: [main]
    paths:
      - "*.py"
      - "pipeline/**"
      - "MODEL_TEMPLATE.xlsx"
      - "tests/**"
      - ".github/workflows/regression.yml"
  pull_request:
    paths:
      - "*.py"
      - "pipeline/**"
      - "MODEL_TEMPLATE.xlsx"
      - "tests/**"
  workflow_dispatch:
    inputs:
      scope:
        description: "grid scope: quick | standard | full"
        required: false
        default: "standard"

concurrency:
  group: regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install LibreOffice + deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice-calc
          python -m pip install --upgrade pip
          pip install openpyxl==3.1.5 pyyaml

      - name: Run regression harness (tie is the oracle)
        run: |
          set -euo pipefail
          SCOPE="${{ github.event.inputs.scope || 'standard' }}"
          FLAG=""
          [ "$SCOPE" = "quick" ] && FLAG="--quick"
          [ "$SCOPE" = "full" ]  && FLAG="--full"
          python test_regression.py $FLAG
